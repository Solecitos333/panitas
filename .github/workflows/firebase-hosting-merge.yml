name: Producción Firebase

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
      - uses: google-github-actions/auth@v3
        with:
          project_id: los-panitas-by-nechy
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOS_PANITAS_BY_NECHY }}
      - name: Desplegar Hosting
        shell: bash
        run: |
          set +e
          output=$(npx firebase-tools deploy --only hosting --project los-panitas-by-nechy --non-interactive 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s' "$output" | grep -Fq 'is the current active version'; then
            echo 'Firebase confirmó que la versión ya quedó activa; el reintento es idempotente.'
            exit 0
          fi
          exit "$status"
