name: Vista previa Firebase

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: google-github-actions/auth@v3
        with:
          project_id: los-panitas-by-nechy
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOS_PANITAS_BY_NECHY }}
      - name: Desplegar canal preview
        shell: bash
        run: |
          set +e
          output=$(npx firebase-tools hosting:channel:deploy "pr-${{ github.event.number }}" --project los-panitas-by-nechy --expires 14d --non-interactive 2>&1)
          status=$?
          if [ "$status" -ne 0 ] && printf '%s' "$output" | grep -Fq 'already exists'; then
            printf '%s\n' "$output"
            echo 'El canal fue creado antes de perderse la respuesta; reintentando sobre el canal existente.'
            output=$(npx firebase-tools hosting:channel:deploy "pr-${{ github.event.number }}" --project los-panitas-by-nechy --expires 14d --non-interactive 2>&1)
            status=$?
          fi
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s' "$output" | grep -Fq 'is the current active version'; then
            echo 'Firebase confirmó que el canal preview ya apunta a esta versión.'
            exit 0
          fi
          exit "$status"
